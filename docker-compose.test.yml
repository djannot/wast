version: '3.8'

services:
  dvwa:
    image: docker.io/vulnerables/web-dvwa:latest
    container_name: dvwa-test
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=dvwa
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/setup.php"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - dvwa-net

  mysql:
    image: mysql:5.7
    container_name: dvwa-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=dvwa
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dvwa-net
    tmpfs:
      - /var/lib/mysql

networks:
  dvwa-net:
    driver: bridge
